<script>
// v54: odstraňuje jen service workery a cache patřící této Pilates aplikaci.
(function(){
  try {
    var appPath = location.origin + location.pathname.replace(/\/[^\/]*$/, '/');
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.getRegistrations().then(function(regs){
        regs.forEach(function(reg){
          if (reg.scope && reg.scope.indexOf(appPath) === 0) reg.unregister();
        });
      }).catch(function(){});
    }
    if ('caches' in window) {
      caches.keys().then(function(keys){
        keys.forEach(function(key){
          if (/^(PB40|pb40|pilates)/i.test(key)) caches.delete(key);
        });
      }).catch(function(){});
    }
  } catch(e) {}
})();
</script>
